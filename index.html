<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão CSS - Ajuste os Erros</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CABEÇALHO -->
  <header class="topo">
    <h1 class="titulo-principal">Meu Portfólio Profissional</h1>
    <p class="subtitulo">Corrija alguns erros no CSS para melhorar este site.</p>
  </header>

  <!-- MENU -->
  <nav class="menu">
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Projetos</a>
    <a href="#">Contato</a>
  </nav>

  <!-- CONTEÚDO -->
  <main class="container">

    <!-- PERFIL -->
    <section class="perfil card">
      <img src="https://i.pravatar.cc/150" alt="Foto de Perfil" class="foto-perfil">
      <h2>Prof. Will Santos</h2>
      <p>Professor de Desenvolvimento de Sistemas</p>
      <button class="botao">Saiba Mais</button>
    </section>

    <!-- HABILIDADES -->
    <section class="habilidades card">
      <h2>Habilidades</h2>

      <div class="caixas-habilidades">
        <div class="habilidade">HTML</div>
        <div class="habilidade">CSS</div>
        <div class="habilidade">JavaScript</div>
      </div>
    </section>

  </main>

  <!-- RODAPÉ -->
  <footer class="rodape">
    <p>Desafio CSS3 | Encontre e corrija os erros</p>
  </footer>

</body>
</html>
